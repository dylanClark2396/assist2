<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMD Women's Basketball — DBO Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e03a3e;
      --dark-red: #b52d31;
      --gold: #ffd200;
      --black: #1a1a1a;
      --sidebar-bg: #1c1c1c;
      --card-bg: #ffffff;
      --bg: #f4f5f7;
      --border: #e0e0e0;
      --win: #2e7d32;
      --win-light: #e8f5e9;
      --loss: #c62828;
      --loss-light: #ffebee;
      --open: #546e7a;
      --open-light: #eceff1;
      --neutral-color: #e65100;
      --neutral-light: #fff3e0;
      --text-muted: #6b7280;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--black);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      background: var(--red);
      padding: 20px 16px;
    }
    .sidebar-school {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .sidebar-team {
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      margin-top: 2px;
    }
    .sidebar-season {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .sidebar-role {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-section-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.73rem;
      color: rgba(255,255,255,0.65);
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-nav {
      padding: 12px 10px;
      flex: 1;
    }
    .nav-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 9px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-btn.active { background: var(--red); color: #fff; font-weight: 700; }

    /* ── MAIN ── */
    #main {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 24px;
    }
    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--black);
    }
    .page-header p {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 3px;
    }

    /* VIEWS */
    .view { display: none; }
    .view.active { display: block; }

    /* ── CALENDAR VIEW ── */
    .cal-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .cal-nav h3 {
      font-size: 1.2rem;
      font-weight: 800;
      min-width: 200px;
      text-align: center;
    }
    .cal-arrow {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-arrow:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .cal-arrow:disabled { opacity: 0.3; cursor: default; }
    .cal-arrow:disabled:hover { background: #fff; color: inherit; border-color: var(--border); }

    .cal-grid-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      min-height: 80px;
      border-radius: 10px;
      padding: 7px 8px;
      background: #fff;
      border: 1.5px solid var(--border);
      cursor: default;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .cal-day.other-month { background: #f9f9f9; opacity: 0.4; }
    .cal-day.has-game { cursor: pointer; }
    .cal-day.has-game:hover { border-color: var(--red); box-shadow: 0 2px 12px rgba(224,58,62,0.18); z-index: 1; }
    .cal-day.selected { border-color: var(--red); box-shadow: 0 2px 12px rgba(224,58,62,0.25); }
    .cal-day.is-open { background: var(--open-light); border-color: #b0bec5; }
    .cal-day.is-win { background: var(--win-light); border-color: #81c784; }
    .cal-day.is-loss { background: var(--loss-light); border-color: #e57373; }
    .cal-day.is-neutral-win { background: var(--neutral-light); border-color: #ffb74d; }
    .cal-day.is-neutral-loss { background: var(--loss-light); border-color: #e57373; }

    .cal-day-num {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 4px;
    }
    .cal-day.other-month .cal-day-num { color: #aaa; }

    .cal-game-pill {
      margin-top: 4px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      display: inline-block;
      line-height: 1.3;
    }
    .pill-win { background: var(--win); color: #fff; }
    .pill-loss { background: var(--loss); color: #fff; }
    .pill-open { background: var(--open); color: #fff; }
    .pill-scheduled { background: #1565c0; color: #fff; }

    .cal-opponent {
      font-size: 0.64rem;
      color: #444;
      margin-top: 5px;
      font-weight: 600;
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .cal-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .cal-conf-label {
      font-size: 0.58rem;
      font-weight: 600;
      color: #3949ab;
    }

    .cal-loc-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .badge-H { background: #1565c0; color: #fff; }
    .badge-A { background: #4a148c; color: #fff; }
    .badge-N { background: var(--neutral-color); color: #fff; }

    /* Game detail panel */
    #game-detail {
      margin-top: 20px;
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      display: none;
    }
    #game-detail.visible { display: block; }
    .gd-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .gd-title { font-size: 1.25rem; font-weight: 800; }
    .gd-result-badge {
      font-size: 1rem;
      font-weight: 800;
      padding: 5px 14px;
      border-radius: 8px;
    }
    .gd-result-badge.win { background: var(--win); color: #fff; }
    .gd-result-badge.loss { background: var(--loss); color: #fff; }
    .gd-result-badge.open { background: var(--open); color: #fff; }
    .gd-meta { display: flex; flex-wrap: wrap; gap: 20px; }
    .gd-meta-item { font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 2px; }
    .gd-meta-item strong { color: var(--black); font-size: 0.85rem; }

    /* ── SCHEDULE LIST VIEW ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .filter-btn:hover { border-color: var(--red); color: var(--red); }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    .schedule-month-group { margin-bottom: 28px; }
    .schedule-month-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
    }

    .game-row {
      display: grid;
      grid-template-columns: 90px 28px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .game-row:hover { border-color: #aaa; }
    .game-row.open-date { background: var(--open-light); }
    .game-row.win-row { border-left: 4px solid var(--win); }
    .game-row.loss-row { border-left: 4px solid var(--loss); }
    .game-row.open-row { border-left: 4px solid var(--open); }

    .gr-date { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
    .gr-loc-badge {
      font-size: 0.6rem; font-weight: 800; padding: 2px 5px;
      border-radius: 4px; text-align: center;
    }
    .gr-opponent { font-size: 0.88rem; font-weight: 700; }
    .gr-opponent .venue-info { font-size: 0.7rem; font-weight: 400; color: var(--text-muted); margin-top: 2px; }
    .gr-opponent .time-info { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); margin-top: 1px; }
    .gr-result {
      font-size: 0.78rem; font-weight: 800; text-align: right;
      min-width: 80px;
    }
    .gr-result.w { color: var(--win); }
    .gr-result.l { color: var(--loss); }
    .gr-result.open { color: var(--open); font-style: italic; }

    .conf-tag {
      font-size: 0.58rem; font-weight: 700; background: #e8eaf6;
      color: #3949ab; padding: 1px 6px; border-radius: 3px;
      margin-left: 6px; vertical-align: middle;
    }
    .tourn-tag {
      font-size: 0.58rem; font-weight: 700; background: #fce4ec;
      color: #c62828; padding: 1px 5px; border-radius: 3px;
      margin-left: 4px; vertical-align: middle;
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: auto; position: relative; }
      #main { padding: 16px; }
      .game-row { grid-template-columns: 80px 24px 1fr auto; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-school">University of Maryland</div>
    <div class="sidebar-team">Women's Basketball</div>
    <div class="sidebar-season">2025-26 Season</div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-btn active" onclick="showView('calendar')" id="nav-calendar">Calendar</button>
    <button class="nav-btn" onclick="showView('schedule')" id="nav-schedule">Full Schedule</button>
  </nav>
</aside>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div id="load-overlay" style="
  position:fixed;inset:0;background:rgba(255,255,255,0.9);
  display:flex;align-items:center;justify-content:center;
  z-index:999;font-family:inherit;
">
  <p style="font-size:0.9rem;color:#555;">Loading schedule…</p>
</div>

<main id="main">

  <!-- ── CALENDAR VIEW ── -->
  <div class="view active" id="view-calendar">
    <div class="page-header">
      <h2>Season Calendar</h2>
      <p>Click any game day to view details. Open dates are highlighted in gray.</p>
    </div>

    <div class="cal-nav">
      <button class="cal-arrow" id="cal-prev" onclick="changeMonth(-1)">&#8592;</button>
      <h3 id="cal-month-label"></h3>
      <button class="cal-arrow" id="cal-next" onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div class="cal-grid-header">
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <div id="game-detail"></div>
  </div>

  <!-- ── SCHEDULE VIEW ── -->
  <div class="view" id="view-schedule">
    <div class="page-header">
      <h2>Full Schedule</h2>
      <p>2025-26 season schedule</p>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterSchedule('all', this)">All Games</button>
      <button class="filter-btn" onclick="filterSchedule('home', this)">Home</button>
      <button class="filter-btn" onclick="filterSchedule('away', this)">Away</button>
      <button class="filter-btn" onclick="filterSchedule('neutral', this)">Neutral</button>
      <button class="filter-btn" onclick="filterSchedule('conference', this)">Big Ten</button>
      <button class="filter-btn" onclick="filterSchedule('nonconf', this)">Non-Conf</button>
      <button class="filter-btn" onclick="filterSchedule('open', this)">Open Dates</button>
    </div>

    <div id="schedule-list"></div>
  </div>


</main>

<script>
// ═══════════════════════════════════════════════
// CSV PARSING
// ═══════════════════════════════════════════════
const MONTH_MAP = {
  January:'01', February:'02', March:'03', April:'04',
  May:'05', June:'06', July:'07', August:'08',
  September:'09', October:'10', November:'11', December:'12'
};

function parseCsvDate(raw) {
  // "November 03 2025" → "2025-11-03"
  const parts = raw.trim().split(/\s+/);
  if (parts.length !== 3) return null;
  const [mon, day, year] = parts;
  const m = MONTH_MAP[mon];
  if (!m) return null;
  return `${year}-${m}-${day.padStart(2, '0')}`;
}

function normalizeTime(raw) {
  if (!raw) return '';
  // "6 PM" → "6:00 PM", "5:30 PM" stays, "12 PM" → "12:00 PM"
  return raw.trim().replace(/^(\d+)\s+(AM|PM)$/, '$1:00 $2');
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  // Skip header row
  const rows = lines.slice(1);
  const schedule = [];

  rows.forEach(line => {
    // Handle quoted fields (e.g. "Big Ten Tournament,extra")
    const cols = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);

    // Columns: DATE,TIME,LOCATION_TYPE,OPPONENT,CITY_STATE,VENUE,TOURNAMENT,CONFERENCE_GAME
    const [rawDate, time, locType, opponent, cityState, venue, tournament, confRaw] = cols;

    const date = parseCsvDate(rawDate || '');
    if (!date) return;

    // Open date: row with a date but no opponent
    const isOpen = !opponent?.trim();

    if (isOpen) {
      schedule.push({ date, isOpen: true });
    } else {
      schedule.push({
        date,
        time:       normalizeTime(time),
        location:   locType?.trim()    || '',
        opponent:   opponent?.trim()   || '',
        city:       cityState?.trim()  || '',
        venue:      venue?.trim()      || '',
        tournament: tournament?.trim() || '',
        conference: confRaw?.trim().toLowerCase() === 'yes',
        isOpen:     false,
      });
    }
  });

  return schedule;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let SCHEDULE = [];
let gameByDate = {};
let SEASON_MONTHS = [];
let currentMonthIdx = 0;


// ═══════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

// ═══════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function pad(n) { return String(n).padStart(2,'0'); }
function dateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

function buildSeasonMonths() {
  const seen = new Set();
  SCHEDULE.forEach(g => {
    const dt = new Date(g.date + 'T12:00:00');
    seen.add(`${dt.getFullYear()}-${dt.getMonth()}`);
  });
  SEASON_MONTHS = Array.from(seen)
    .sort()
    .map(k => { const [y, m] = k.split('-'); return { year: +y, month: +m }; });
}

function renderCalendar() {
  if (!SEASON_MONTHS.length) return;
  const { year, month } = SEASON_MONTHS[currentMonthIdx];
  document.getElementById('cal-month-label').textContent = `${MONTHS[month]} ${year}`;
  document.getElementById('cal-prev').disabled = currentMonthIdx === 0;
  document.getElementById('cal-next').disabled = currentMonthIdx === SEASON_MONTHS.length - 1;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevMonthDays - i, inMonth: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, inMonth: true, year, month });
  const remainder = 42 - cells.length;
  for (let d = 1; d <= remainder; d++) cells.push({ day: d, inMonth: false });

  cells.forEach(cell => {
    const el = document.createElement('div');
    el.className = 'cal-day';

    if (!cell.inMonth) {
      el.classList.add('other-month');
      el.innerHTML = `<span class="cal-day-num">${cell.day}</span>`;
      grid.appendChild(el);
      return;
    }

    const ds = dateStr(cell.year, cell.month, cell.day);
    const game = gameByDate[ds];
    el.innerHTML = `<span class="cal-day-num">${cell.day}</span>`;

    if (game) {
      if (game.isOpen) {
        el.classList.add('is-open');
        el.innerHTML += `<span class="cal-game-pill pill-open">Open Date</span>`;
      } else {
        el.classList.add('has-game');
        const isWin = game.result?.startsWith('W');
        const isLoss = game.result?.startsWith('L');

        if (game.location === 'Neutral') {
          el.classList.add(isWin ? 'is-neutral-win' : 'is-neutral-loss');
        } else {
          if (isWin) el.classList.add('is-win');
          else if (isLoss) el.classList.add('is-loss');
        }

        const pillClass = isWin ? 'pill-win' : (isLoss ? 'pill-loss' : 'pill-scheduled');
        const resultText = game.result || game.time || 'TBD';
        el.innerHTML += `<div class="cal-opponent">${game.opponent}</div>`;
        el.innerHTML += `<div class="cal-meta-row">
          <span class="cal-game-pill ${pillClass}">${resultText}</span>
          ${game.conference ? `<span class="cal-conf-label">Conference</span>` : ''}
        </div>`;
        el.innerHTML += `<span class="cal-loc-badge badge-${game.location[0]}">${game.location[0]}</span>`;
        el.addEventListener('click', () => showGameDetail(game, ds, el));
      }
    }

    grid.appendChild(el);
  });

  const det = document.getElementById('game-detail');
  det.classList.remove('visible');
  det.innerHTML = '';
}

function changeMonth(delta) {
  currentMonthIdx = Math.max(0, Math.min(SEASON_MONTHS.length - 1, currentMonthIdx + delta));
  renderCalendar();
}

function showGameDetail(game, ds, clickedEl) {
  document.querySelectorAll('.cal-day.selected').forEach(e => e.classList.remove('selected'));
  clickedEl.classList.add('selected');

  const det = document.getElementById('game-detail');
  const dateObj = new Date(ds + 'T12:00:00');
  const dateLabel = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const isWin = game.result?.startsWith('W');
  const isLoss = game.result?.startsWith('L');
  const resultClass = isWin ? 'win' : (isLoss ? 'loss' : 'open');
  const locLabel = { Home: 'Home', Away: 'Away', Neutral: 'Neutral Site' }[game.location] || game.location;
  const confBadge = game.conference ? '<span class="conf-tag">BIG TEN</span>' : '';
  const tournBadge = game.tournament ? `<span class="tourn-tag">${game.tournament}</span>` : '';

  det.innerHTML = `
    <div class="gd-header">
      <div>
        <div class="gd-title">vs. ${game.opponent} ${confBadge}${tournBadge}</div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;">${dateLabel}</div>
      </div>
      ${game.result ? `<div class="gd-result-badge ${resultClass}">${game.result}</div>` : ''}
    </div>
    <div class="gd-meta">
      <div class="gd-meta-item">Tip-off<strong>${game.time || '—'}</strong></div>
      <div class="gd-meta-item">Location<strong>${locLabel}</strong></div>
      ${game.location !== 'Home' && game.venue ? `<div class="gd-meta-item">Venue<strong>${game.venue}</strong></div>` : ''}
      ${game.location !== 'Home' && game.city  ? `<div class="gd-meta-item">City<strong>${game.city}</strong></div>`  : ''}
      ${game.tournament ? `<div class="gd-meta-item">Tournament<strong>${game.tournament}</strong></div>` : ''}
    </div>
  `;
  det.classList.add('visible');
  det.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ═══════════════════════════════════════════════
// SCHEDULE LIST
// ═══════════════════════════════════════════════
function renderSchedule(filter = 'all') {
  const list = document.getElementById('schedule-list');
  list.innerHTML = '';

  const filtered = SCHEDULE.filter(g => {
    if (filter === 'all')        return true;
    if (filter === 'open')       return g.isOpen;
    if (g.isOpen)                return false;
    if (filter === 'home')       return g.location === 'Home';
    if (filter === 'away')       return g.location === 'Away';
    if (filter === 'neutral')    return g.location === 'Neutral';
    if (filter === 'conference') return g.conference;
    if (filter === 'nonconf')    return !g.conference;
    return true;
  });

  const byMonth = {};
  filtered.forEach(g => {
    const dt = new Date(g.date + 'T12:00:00');
    const key = `${dt.getFullYear()}-${String(dt.getMonth()).padStart(2,'0')}`;
    const label = dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (!byMonth[key]) byMonth[key] = { label, games: [] };
    byMonth[key].games.push(g);
  });

  if (!Object.keys(byMonth).length) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No games match this filter.</p>';
    return;
  }

  Object.keys(byMonth).sort().forEach(key => {
    const group = byMonth[key];
    const section = document.createElement('div');
    section.className = 'schedule-month-group';
    section.innerHTML = `<div class="schedule-month-title">${group.label}</div>`;

    group.games.forEach(g => {
      const row = document.createElement('div');
      row.className = 'game-row';
      const dt = new Date(g.date + 'T12:00:00');
      const dayLabel = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      if (g.isOpen) {
        row.classList.add('open-row');
        row.innerHTML = `
          <div class="gr-date">${dayLabel}</div>
          <div></div>
          <div class="gr-opponent" style="color:var(--open);font-style:italic;">Open Date</div>
          <div class="gr-result open"></div>
        `;
      } else {
        const isWin = g.result?.startsWith('W');
        const isLoss = g.result?.startsWith('L');
        if (isWin) row.classList.add('win-row');
        else if (isLoss) row.classList.add('loss-row');

        const locCode = g.location[0];
        const locColors = { H: '#1565c0', A: '#4a148c', N: '#e65100' };
        const confBadge  = g.conference ? '<span class="conf-tag">Conference</span>' : '';
        const tournBadge = g.tournament ? `<span class="tourn-tag">${g.tournament.split('—')[0].trim()}</span>` : '';
        let venueCity = '';
        if (g.location !== 'Home') {
          if (g.venue) venueCity = `${g.venue} · ${g.city}`;
          else if (g.city) venueCity = g.city;
        }

        row.innerHTML = `
          <div class="gr-date">${dayLabel}</div>
          <div class="gr-loc-badge" style="background:${locColors[locCode]||'#333'};color:#fff;">${locCode}</div>
          <div class="gr-opponent">
            ${g.opponent}${confBadge}${tournBadge}
            ${g.time ? `<div class="time-info">${g.time}</div>` : ''}
            ${venueCity ? `<div class="venue-info">${venueCity}</div>` : ''}
          </div>
          <div class="gr-result ${isWin ? 'w' : (isLoss ? 'l' : '')}">${g.result || ''}</div>
        `;
      }
      section.appendChild(row);
    });

    list.appendChild(section);
  });
}

function filterSchedule(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedule(filter);
}


// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function initFromCSV(csvText) {
  SCHEDULE = parseCSV(csvText);
  gameByDate = {};
  SCHEDULE.forEach(g => { gameByDate[g.date] = g; });
  buildSeasonMonths();
  renderCalendar();
  renderSchedule('all');
  const overlay = document.getElementById('load-overlay');
  if (overlay) overlay.remove();
}

(async () => {
  const res = await fetch('umd_womens_basketball_schedule.csv');
  const text = await res.text();
  initFromCSV(text);
})();
</script>
